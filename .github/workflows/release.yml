name: Release Stream Deck

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Stream Deck ${{ github.ref_name }}"
          releaseBody: "New Stream Deck release."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true

      - name: Build visual installer bootstrapper
        working-directory: src-tauri
        run: cargo build --release --bin stream_deck_installer

      - name: Package visual installer bootstrapper
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Copy-Item src-tauri/target/release/stream_deck_installer.exe "src-tauri/target/release/Stream.Deck_${version}_x64-installer.exe"

      - name: Upload visual installer bootstrapper
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/Stream.Deck_*_x64-installer.exe
