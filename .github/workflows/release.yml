name: Release Stream Pad

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Stream Pad ${{ github.ref_name }}"
          releaseBody: "New Stream Pad release."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true

      - name: Build visual installer bootstrapper
        working-directory: installer-bootstrapper
        run: cargo build --release

      - name: Package visual installer bootstrapper
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Copy-Item installer-bootstrapper/target/release/stream_pad_installer.exe "installer-bootstrapper/target/release/Stream.Pad_${version}_x64-installer.exe"

      - name: Upload visual installer bootstrapper
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: installer-bootstrapper/target/release/Stream.Pad_*_x64-installer.exe

      - name: Remove non-user-facing release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          $hiddenAssets = @(
            "Stream.Pad_${version}_x64-setup.exe.sig",
            "Stream.Pad_${version}_x64_en-US.msi",
            "Stream.Pad_${version}_x64_en-US.msi.sig"
          )

          foreach ($asset in $release.assets) {
            if ($hiddenAssets -contains $asset.name) {
              Invoke-RestMethod -Method Delete -Headers $headers -Uri $asset.url
            }
          }
